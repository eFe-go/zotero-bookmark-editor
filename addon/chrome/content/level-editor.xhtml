<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Bookmark Editor — Level Editor</title>
    <link rel="localization" href="__addonRef__-addon.ftl" />
    <style type="text/css">
      /* ===== Theme variables ===== */
      :root {
        --le-bg: #ffffff;
        --le-header-bg: #f5f5f5;
        --le-toolbar-bg: #fafafa;
        --le-border: #d0d0d0;
        --le-divider: #e0e0e0;
        --le-button-bg: #ffffff;
        --le-button-border: #c0c0c0;
        --le-button-hover: #e8f4fd;
        --le-button-active: #cce5ff;
        --le-primary: #2196f3;
        --le-primary-text: #ffffff;
        --le-text: #222;
        --le-text-muted: #666;
        --le-row-hover: #f0f0f0;
        --le-row-selected: #cce5ff;
        --le-tree-line: #c8c8c8;
        --le-drop-indicator: #1976d2;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --le-bg: #1e1e1e;
          --le-header-bg: #252525;
          --le-toolbar-bg: #2a2a2a;
          --le-border: #444;
          --le-divider: #3a3a3a;
          --le-button-bg: #2d2d2d;
          --le-button-border: #555;
          --le-button-hover: #2a4055;
          --le-button-active: #3a5570;
          --le-text: #e0e0e0;
          --le-text-muted: #999;
          --le-row-hover: #2a2a2a;
          --le-row-selected: #2a4055;
          --le-tree-line: #555;
          --le-drop-indicator: #2196f3;
        }
      }

      /* ===== Layout ===== */
      body.le-window {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: var(--le-bg);
        color: var(--le-text);
        font-size: 13px;
      }
      .le-header {
        padding: 8px 12px;
        background: var(--le-header-bg);
        border-bottom: 1px solid var(--le-border);
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .le-title {
        font-size: 14px;
        font-weight: 600;
      }
      .le-status {
        font-size: 11px;
        color: var(--le-text-muted);
      }
      .le-status .le-dirty {
        color: #e67e22;
        font-weight: 600;
      }
      .le-toolbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 8px;
        background: var(--le-toolbar-bg);
        border-bottom: 1px solid var(--le-divider);
        flex-shrink: 0;
      }
      .le-toolbar .le-sep {
        width: 1px;
        height: 22px;
        background: var(--le-divider);
        margin: 0 4px;
      }
      .le-toolbar button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 28px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--le-text);
        cursor: pointer;
        border-radius: 4px;
        padding: 0;
      }
      .le-toolbar button:hover:not(:disabled) {
        background: var(--le-button-hover);
        border-color: var(--le-button-border);
      }
      .le-toolbar button:active:not(:disabled) {
        background: var(--le-button-active);
      }
      .le-toolbar button:disabled {
        opacity: 0.35;
        cursor: default;
      }
      .le-toolbar button svg {
        width: 18px;
        height: 18px;
        display: block;
      }

      /* ===== Main area + tree ===== */
      #level-editor-content {
        flex: 1;
        overflow: auto;
        background: var(--le-bg);
        padding: 4px 0;
      }
      #j-outline-viewer {
        outline: none;
      }
      /* Root list: kill bullets and outer spacing only. */
      body.le-window #root-list {
        list-style: none !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      body.le-window #root-list li.tree-item {
        position: relative;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      /* Nested lists inherit the same specificity as the root reset
         (id + descendant ul) so we can force indent + connector here. */
      body.le-window #root-list ul {
        list-style: none !important;
        margin: 0 !important;
        padding: 0 0 0 22px !important;
        position: relative;
        border-left: 1px dashed var(--le-tree-line);
        margin-left: 6px !important;
      }
      /* Hide nested ul when parent is collapsed */
      body.le-window #root-list li.tree-item.collapsed > ul {
        display: none !important;
      }

      /* ===== Row (tree-node) ===== */
      body.le-window .tree-list li.tree-item > .tree-node {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 24px;
        padding: 2px 8px 2px 4px;
        cursor: pointer;
        border-radius: 3px;
        user-select: none;
        font-size: 13px;
        line-height: 1;
        color: var(--le-text);
        border-left: 3px solid transparent;
      }
      body.le-window .tree-list li.tree-item > .tree-node:hover {
        background: var(--le-row-hover);
      }
      body.le-window .tree-list li.tree-item > .tree-node.node-selected {
        background: var(--le-row-selected);
      }
      /* Use the level-N color as the row's left rail */
      body.le-window .tree-list .tree-node.level-1 {
        border-left-color: #ff5252;
      }
      body.le-window .tree-list .tree-node.level-2 {
        border-left-color: #ff9800;
      }
      body.le-window .tree-list .tree-node.level-3 {
        border-left-color: #ffeb3b;
      }
      body.le-window .tree-list .tree-node.level-4 {
        border-left-color: #4caf50;
      }
      body.le-window .tree-list .tree-node.level-5 {
        border-left-color: #2196f3;
      }
      body.le-window .tree-list .tree-node.level-6 {
        border-left-color: #673ab7;
      }
      body.le-window .tree-list .tree-node.level-7 {
        border-left-color: #e91e63;
      }

      /* Expander (triangle) — clickable */
      body.le-window .tree-node .expander {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        color: var(--le-text-muted);
        cursor: pointer;
      }
      body.le-window .tree-node .expander svg {
        width: 12px;
        height: 12px;
        display: block;
      }
      /* Hide expander content when there are no children */
      body.le-window
        .tree-list
        li.tree-item:not(.has-children)
        .expander
        svg {
        display: none;
      }

      /* Icon column (folder / file) */
      body.le-window .tree-node .node-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      body.le-window .tree-node .node-icon svg {
        width: 16px;
        height: 16px;
        display: block;
      }

      /* Title */
      body.le-window .tree-node .node-title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px !important;
        color: var(--le-text);
      }
      body.le-window .tree-node .node-title[contenteditable="true"] {
        background: var(--le-bg);
        border: 1px solid var(--le-primary);
        padding: 1px 3px;
        border-radius: 2px;
        outline: none;
      }

      /* Page number column */
      body.le-window .tree-node .node-page {
        font-size: 11px;
        color: var(--le-text-muted);
        flex-shrink: 0;
        margin-left: 6px;
        font-variant-numeric: tabular-nums;
      }

      /* Hide any inherited rainbow border / fonts from outline_css */
      body.le-window .tree-list .tree-node {
        font-family: inherit !important;
      }

      /* Drop indicator (drag-drop) */
      body.le-window .drop-indicator {
        position: absolute;
        height: 2px;
        background: var(--le-drop-indicator);
        pointer-events: none;
        z-index: 10;
      }
      body.le-window .tree-list li.tree-item.dragover > .tree-node {
        background: var(--le-button-hover);
        outline: 1px dashed var(--le-drop-indicator);
      }

      /* ===== Footer ===== */
      .le-footer {
        padding: 8px 12px;
        background: var(--le-header-bg);
        border-top: 1px solid var(--le-border);
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        flex-shrink: 0;
      }
      .le-footer button {
        padding: 6px 18px;
        font-size: 13px;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid var(--le-button-border);
        background: var(--le-button-bg);
        color: var(--le-text);
      }
      .le-footer button:hover {
        background: var(--le-button-hover);
      }
      .le-footer button.primary {
        background: var(--le-primary);
        color: var(--le-primary-text);
        border-color: var(--le-primary);
      }
      .le-footer button.primary:hover {
        opacity: 0.92;
      }
    </style>
  </head>
  <body class="le-window">
    <header class="le-header">
      <div id="le-title-text" class="le-title"></div>
      <div id="le-status" class="le-status"></div>
    </header>
    <div class="le-toolbar" id="le-toolbar">
      <button id="le-btn-new-sibling" type="button"></button>
      <button id="le-btn-new-child" type="button"></button>
      <button id="le-btn-rename" type="button"></button>
      <button id="le-btn-delete" type="button"></button>
      <span class="le-sep"></span>
      <button id="le-btn-up" type="button"></button>
      <button id="le-btn-down" type="button"></button>
      <button id="le-btn-nest" type="button"></button>
      <button id="le-btn-unnest" type="button"></button>
      <span class="le-sep"></span>
      <button id="le-btn-expand-all" type="button"></button>
      <button id="le-btn-collapse-all" type="button"></button>
    </div>
    <main id="level-editor-content">
      <div id="j-outline-viewer" tabindex="-1">
        <ul id="root-list" class="tree-list"></ul>
      </div>
    </main>
    <footer class="le-footer">
      <button id="level-editor-discard" type="button"></button>
      <button id="level-editor-save" class="primary" type="button"></button>
    </footer>
  </body>
</html>
