<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Bookmark Editor — Level Editor</title>
    <link rel="localization" href="__addonRef__-addon.ftl" />
    <link
      rel="stylesheet"
      href="chrome://__addonRef__/content/prefpanel.css"
    />
    <style type="text/css">
      :root {
        --le-bg: #ffffff;
        --le-header-bg: #f5f5f5;
        --le-border: #d0d0d0;
        --le-button-bg: #fafafa;
        --le-button-border: #b0b0b0;
        --le-button-hover: #e8f4fd;
        --le-primary: #2196f3;
        --le-primary-text: white;
        --le-text: #222;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --le-bg: #1e1e1e;
          --le-header-bg: #2a2a2a;
          --le-border: #444;
          --le-button-bg: #2a2a2a;
          --le-button-border: #555;
          --le-button-hover: #2a4055;
          --le-text: #e0e0e0;
        }
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: var(--le-bg);
        color: var(--le-text);
      }
      .le-header {
        padding: 10px 16px;
        background: var(--le-header-bg);
        border-bottom: 1px solid var(--le-border);
        font-size: 16px;
        font-weight: 600;
      }
      #level-editor-content {
        flex: 1;
        overflow: auto;
        padding: 16px;
      }
      .le-footer {
        padding: 10px 16px;
        background: var(--le-header-bg);
        border-top: 1px solid var(--le-border);
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .le-footer button {
        padding: 6px 18px;
        font-size: 13px;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid var(--le-button-border);
        background: var(--le-button-bg);
        color: var(--le-text);
      }
      .le-footer button:hover {
        background: var(--le-button-hover);
      }
      .le-footer button.primary {
        background: var(--le-primary);
        color: var(--le-primary-text);
        border-color: var(--le-primary);
      }
      .le-footer button.primary:hover {
        opacity: 0.9;
      }
      /* Inline movement buttons injected next to each tree-node */
      .tree-node-actions {
        display: inline-flex;
        gap: 2px;
        margin-left: 8px;
        vertical-align: middle;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .tree-node:hover .tree-node-actions,
      .tree-node.node-selected .tree-node-actions {
        opacity: 1;
      }
      .tree-node-actions button {
        padding: 2px 4px;
        border: 1px solid var(--le-button-border);
        background: var(--le-button-bg);
        color: var(--le-text);
        cursor: pointer;
        line-height: 1;
        border-radius: 3px;
      }
      .tree-node-actions button:hover {
        background: var(--le-button-hover);
      }
      .tree-node-actions svg {
        width: 16px;
        height: 16px;
        display: block;
      }
    </style>
  </head>
  <body>
    <header class="le-header">
      <span id="le-title-text"></span>
    </header>
    <main id="level-editor-content">
      <div id="j-outline-viewer" tabindex="-1">
        <ul id="root-list" class="tree-list"></ul>
      </div>
    </main>
    <footer class="le-footer">
      <button id="level-editor-discard"></button>
      <button id="level-editor-save" class="primary"></button>
    </footer>
  </body>
</html>
